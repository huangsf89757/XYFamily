<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文档浏览器 - XYFamily Wiki</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* ===== Unified Top Navigation (Task D) ===== */
        .topnav {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 16px;
            padding: 28px 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }
        .topnav::after {
            content: '';
            position: absolute;
            top: -40%; right: -8%;
            width: 360px; height: 360px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            pointer-events: none;
        }
        .topnav-inner { position: relative; z-index: 1; }
        .topnav-title { font-size: 2rem; font-weight: 800; margin-bottom: 6px; line-height: 1.25; display: flex; align-items: center; gap: 10px; }
        .topnav-title .uicon { width: 1.7rem; height: 1.7rem; vertical-align: -0.3rem; }
        .topnav-sub { font-size: 1rem; opacity: 0.88; margin-bottom: 18px; }
        .topnav-stats { display: flex; gap: 14px; flex-wrap: wrap; }
        .topnav-stat {
            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            padding: 12px 22px;
            border-radius: 12px;
            text-align: center;
            min-width: 110px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .topnav-stat .stat-value { font-size: 1.7rem; font-weight: 800; }
        .topnav-stat .stat-label { font-size: 0.78rem; opacity: 0.82; margin-top: 2px; }
        .topnav-home {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 16px;
            background: rgba(255,255,255,0.15);
            color: white; text-decoration: none;
            border-radius: 999px;
            font-size: 0.85rem; font-weight: 600;
            backdrop-filter: blur(10px);
            transition: background 0.2s;
            margin-bottom: 18px;
        }
        .topnav-home:hover { background: rgba(255,255,255,0.28); }
        .topnav-home svg { width: 16px; height: 16px; }

        /* === Breadcrumb Path Bar === */
        .breadcrumb-bar {
            background: white;
            border-radius: 10px;
            padding: 10px 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0;
            border-left: 4px solid #667eea;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .crumb {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            color: #4a5568;
            transition: all 0.15s;
            user-select: none;
            position: relative;
        }

        .crumb:hover { background: #f0f0ff; color: #667eea; }

        .crumb-root { font-weight: 700; color: #667eea; font-size: 0.95rem; }
        .crumb-root:hover { background: #f0f0ff; }

        .crumb-active {
            background: #ebf4ff;
            color: #3182ce;
            font-weight: 600;
        }

        .crumb-sep { color: #cbd5e0; font-size: 0.8rem; margin: 0 1px; user-select: none; }

        .crumb-arrow { font-size: 0.65rem; color: #64748b; margin-left: 2px; }

        /* Dropdown for path segments */
        .path-dropdown {
            position: fixed;
            background: white;
            border-radius: 10px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
            border: 1px solid #e2e8f0;
            max-height: 400px;
            overflow-y: auto;
            min-width: 300px;
            z-index: 10000;
            padding: 6px;
        }

        .path-dropdown::-webkit-scrollbar { width: 5px; }
        .path-dropdown::-webkit-scrollbar-thumb { background: #c3cfe2; border-radius: 3px; }

        .dd-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.12s;
            font-size: 0.86rem;
        }
        .dd-item:hover { background: #f7fafc; }
        .dd-item-active { background: #ebf4ff; color: #3182ce; }

        .dd-folder { color: #2d3748; font-weight: 600; }
        .dd-file { color: #4a5568; }
        .dd-icon { flex-shrink: 0; display: flex; align-items: center; }
        .dd-icon svg { width: 16px; height: 16px; }

        .dd-count {
            background: #edf2f7; color: #718096;
            padding: 1px 8px; border-radius: 10px;
            font-size: 0.7rem; margin-left: auto; flex-shrink: 0;
        }
        .dd-meta { font-size: 0.7rem; color: #64748b; margin-left: auto; flex-shrink: 0; }
        .dd-empty { padding: 20px; text-align: center; color: #64748b; font-size: 0.85rem; }

        /* === Content Area === */
        .content-area {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
            overflow: hidden;
            min-height: 400px;
        }

        .content-header {
            padding: 16px 24px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            background: linear-gradient(135deg, rgba(102,126,234,0.04) 0%, rgba(118,75,162,0.04) 100%);
        }

        .content-title { font-size: 1.2rem; font-weight: 700; color: #2d3748; }
        .content-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-left: auto; align-items: center; }

        /* Back button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.15s;
            flex-shrink: 0;
        }

        .back-btn svg { width: 18px; height: 18px; }
        .back-btn:hover { background: #5568d3; transform: translateX(-2px); }

        .content-title svg { width: 22px; height: 22px; vertical-align: text-bottom; margin-right: 4px; }
        .crumb svg, .crumb-root svg { width: 16px; height: 16px; vertical-align: text-bottom; margin-right: 2px; }

        .badge-version {
            background: #ebf4ff; color: #3182ce;
            padding: 2px 10px; border-radius: 10px;
            font-size: 0.74rem; font-weight: 600; white-space: nowrap;
        }
        .badge-date {
            background: #f0fff4; color: #38a169;
            padding: 2px 10px; border-radius: 10px;
            font-size: 0.74rem; font-weight: 600; white-space: nowrap;
        }
        .badge-count {
            background: #edf2f7; color: #718096;
            padding: 2px 10px; border-radius: 10px;
            font-size: 0.74rem; font-weight: 600; white-space: nowrap;
        }

        .content-body { padding: 0; }

        /* Folder grid view */
        .folder-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 24px;
        }

        .grid-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .grid-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102,126,234,0.12);
            transform: translateY(-2px);
        }

        .grid-card-icon { flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; }
        .grid-card-icon svg { width: 28px; height: 28px; }
        .grid-card-body { flex: 1; min-width: 0; }
        .grid-card-name { font-size: 0.95rem; font-weight: 600; color: #2d3748; margin-bottom: 4px; word-break: break-all; }
        .grid-card-desc { font-size: 0.8rem; color: #64748b; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .grid-card-meta { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }

        .grid-card-folder { border-left: 4px solid #667eea; }
        .grid-card-file { border-left: 4px solid #38a169; }

        /* === List View === */
        .folder-list { padding: 8px 24px 24px; }

        .list-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.12s;
            border-bottom: 1px solid #f1f5f9;
        }

        .list-item:last-child { border-bottom: none; }
        .list-item:hover { background: #f7fafc; }

        .list-item-icon { flex-shrink: 0; width: 28px; text-align: center; display: flex; align-items: center; justify-content: center; }
        .list-item-icon svg { width: 18px; height: 18px; }
        .list-item-body { flex: 1; min-width: 0; }
        .list-item-name { font-size: 0.9rem; font-weight: 600; color: #2d3748; }
        .list-item-desc { font-size: 0.78rem; color: #64748b; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .list-item-meta { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

        /* === View Toggle === */
        .view-toggle {
            display: inline-flex;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            overflow: hidden;
            background: #f7fafc;
        }

        .view-toggle-btn {
            padding: 5px 12px;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .view-toggle-btn.active {
            background: #667eea;
            color: white;
        }

        .view-toggle-btn:hover:not(.active) {
            background: #edf2f7;
            color: #4a5568;
        }

        /* File content iframe */
        .file-iframe { width: 100%; height: 75vh; border: none; display: block; }

        /* Empty state */
        .empty-state { text-align: center; padding: 80px 20px; color: #64748b; }
        .empty-state-icon { margin-bottom: 12px; display: flex; justify-content: center; }
        .empty-state-icon svg { width: 48px; height: 48px; }
        .empty-state-text { font-size: 1rem; }

        @media (max-width: 768px) {
            .folder-grid { grid-template-columns: 1fr; }
            .topnav-title { font-size: 1.6rem; }
            .breadcrumb-bar { position: relative; top: 0; }
            .topnav-home { display: inline-flex; }
        }
    
/* === ui-ux-pro-max optimizations === */
.uicon{width:1.5em;height:1.5em;vertical-align:-0.25em;flex:0 0 auto;}
.func-icon .uicon{width:44px;height:44px;vertical-align:middle;}
.stat-icon .uicon{width:2rem;height:2rem;}
.wiki-icon .uicon{width:1.3rem;height:1.3rem;}
.info-item .uicon{width:1.7rem;height:1.7rem;}
.grid-card .uicon,.list-item .uicon{width:1.4rem;height:1.4rem;}
.grid-card,.list-item,.crumb,.view-toggle-btn,.back-btn,.milestone-detail-header,.func-card,.wiki-link,.detail-ms-link,.task-item,.topnav-home{cursor:pointer;}
a,button{outline:none;}
a:focus-visible,button:focus-visible,.func-card:focus-visible,.wiki-link:focus-visible,.grid-card:focus-visible,.list-item:focus-visible,.crumb:focus-visible,.view-toggle-btn:focus-visible,.topnav-home:focus-visible{border-radius:8px;outline:2px solid #2563eb;outline-offset:2px;}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important;}}

</style>
</head>

            // 4. Restore inline code.
            text = text.replace(/\u0000(\d+)\u0000/g, function(m, idx) {
                return '<code>' + codes[parseInt(idx, 10)] + '</code>';
            });
            return text;
        }

        // Only allow safe URL schemes to avoid javascript:/data: XSS via links.
        function sanitizeUrl(url) {
            const u = url.trim();
            if (/^javascript:/i.test(u)) return '#';
            if (/^data:/i.test(u) && !/^data:image\//i.test(u)) return '#';
            return u;
        }

        function isListLine(line) { return /^(\s*)([-*+]|\d+\.)\s+/.test(line); }
        function getIndent(line) { const m = line.match(/^(\s*)/); return m ? m[1].length : 0; }

        // Detect a markdown table separator row, e.g. |---|---| or | --- | :--: |
        function isTableSeparator(s) {
            s = s.trim();
            if (s === '') return false;
            if (s[0] === '|') s = s.slice(1);
            if (s[s.length - 1] === '|') s = s.slice(0, -1);
            const cols = s.split('|');
            if (cols.length === 0) return false;
            return cols.every(function(c) { return /^:?-+:?$/.test(c.trim()); });
        }

        // Split a table row into trimmed cells (handles leading/trailing pipes).
        function splitRow(s) {
            s = s.trim();
            if (s[0] === '|') s = s.slice(1);
            if (s[s.length - 1] === '|') s = s.slice(0, -1);
            return s.split('|').map(function(c) { return c.trim(); });
        }

        function alignAttr(a) { return a ? ' style="text-align:' + a + '"' : ''; }

        // Build a nested list AST from lines starting at index i with base indentation.
        function buildList(lines, i, baseIndent) {
            const items = [];
            const n = lines.length;
            while (i < n) {
                // Skip blank lines between items (loose lists) when next is a sibling item.
                if (lines[i].trim() === '') {
                    let j = i + 1;
                    while (j < n && lines[j].trim() === '') j++;
                    if (j < n && isListLine(lines[j]) && getIndent(lines[j]) >= baseIndent) { i = j; continue; }
                    break;
                }
                if (!isListLine(lines[i])) break;
                const m = lines[i].match(/^(\s*)([-*+]|\d+\.)\s+(.*)$/);
                const indent = m[1].length;
                if (indent < baseIndent) break; // belongs to an outer list
                if (indent > baseIndent) {
                    if (items.length > 0) {
                        const deeper = indent;
                        const child = buildList(lines, i, deeper);
                        items[items.length - 1].children = child;
                        i = child._next;
                        continue;
                    }
                    break;
                }
                // Sibling item at baseIndent.
                const item = { text: m[3], ordered: /\d+\./.test(m[2]), children: null };
                i++;
                // Nested children (indent greater than baseIndent).
                while (i < n && isListLine(lines[i]) && getIndent(lines[i]) > baseIndent) {
                    const deeper = getIndent(lines[i]);
                    const child = buildList(lines, i, deeper);
                    item.children = child;
                    i = child._next;
                }
                // Continuation text (indented, non-list, non-blank) appended to item text.
                const cont = [];
                while (i < n && lines[i].trim() !== '' && !isListLine(lines[i]) && getIndent(lines[i]) > baseIndent) {
                    cont.push(lines[i].trim());
                    i++;
                }
                if (cont.length) item.text += '<br>' + cont.join('<br>');
                items.push(item);
            }
            items._next = i; // stash next index as a non-enumerable-ish custom prop
            return items;
        }

        // Render a nested list AST to HTML.
        function renderListTree(items) {
            if (!items || items.length === 0) return '';
            const ordered = items[0].ordered;
            let html = ordered ? '<ol>' : '<ul>';
            for (const it of items) {
                html += '<li>' + inlineFormat(it.text);
                if (it.children && it.children.length) html += renderListTree(it.children);
                html += '</li>';
            }
            html += ordered ? '</ol>' : '</ul>';
            return html;
        }

        // Block-level parser over an array of (already escaped) lines.
        function parseBlocks(lines) {
            let html = '';
            let i = 0;
            const n = lines.length;
            while (i < n) {
                const line = lines[i];

                if (line.trim() === '') { i++; continue; }

                // Fenced code block ```lang
                const fence = line.match(/^```(\w*)\s*$/);
                if (fence) {
                    const lang = fence[1];
                    const code = [];
                    i++;
                    while (i < n && !/^```\s*$/.test(lines[i])) { code.push(lines[i]); i++; }
                    i++; // closing fence
                    html += '<pre><code' + (lang ? ' class="language-' + lang + '"' : '') + '>' + code.join('\n') + '</code></pre>';
                    continue;
                }

                // Heading # ~ ######
                const h = line.match(/^(#{1,6})\s+(.*?)\s*#*\s*$/);
                if (h) {
                    const level = h[1].length;
                    html += '<h' + level + '>' + inlineFormat(h[2]) + '</h' + level + '>';
                    i++;
                    continue;
                }

                // Horizontal rule --- / *** / ___
                if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line)) {
                    html += '<hr>';
                    i++;
                    continue;
                }

                // Blockquote > (note: '>' is HTML-escaped to '&gt;' before parsing)
                if (/^&gt;\s?/.test(line)) {
                    const quoteLines = [];
                    while (i < n && /^&gt;\s?/.test(lines[i])) {
                        quoteLines.push(lines[i].replace(/^&gt;\s?/, ''));
                        i++;
                    }
                    html += '<blockquote>' + parseBlocks(quoteLines) + '</blockquote>';
                    continue;
                }

                // Table (header + separator + body rows)
                if (line.indexOf('|') !== -1 && i + 1 < n && isTableSeparator(lines[i + 1])) {
                    const header = splitRow(line);
                    const sep = splitRow(lines[i + 1]);
                    const aligns = sep.map(function(c) {
                        c = c.trim();
                        if (c.length >= 2 && c[0] === ':' && c[c.length - 1] === ':') return 'center';
                        if (c[0] === ':') return 'left';
                        if (c[c.length - 1] === ':') return 'right';
                        return '';
                    });
                    i += 2;
                    const rows = [];
                    while (i < n && lines[i].trim() !== '' && lines[i].indexOf('|') !== -1) {
                        rows.push(splitRow(lines[i]));
                        i++;
                    }
                    let t = '<table><thead><tr>';
                    header.forEach(function(c, idx) { t += '<th' + alignAttr(aligns[idx]) + '>' + inlineFormat(c) + '</th>'; });
                    t += '</tr></thead><tbody>';
                    rows.forEach(function(r) {
                        t += '<tr>';
                        r.forEach(function(c, idx) { t += '<td' + alignAttr(aligns[idx]) + '>' + inlineFormat(c) + '</td>'; });
                        t += '</tr>';
                    });
                    t += '</tbody></table>';
                    html += t;
                    continue;
                }

                // List (ordered / unordered), supports arbitrary nesting depth.
                if (isListLine(line)) {
                    const base = getIndent(line);
                    const tree = buildList(lines, i, base);
                    html += renderListTree(tree);
                    i = tree._next;
                    continue;
                }

                // Paragraph: gather consecutive non-block lines.
                const paraLines = [];
                while (i < n && lines[i].trim() !== '' &&
                       !/^```/.test(lines[i]) &&
                       !/^(#{1,6})\s+/.test(lines[i]) &&
                       !/^(-{3,}|\*{3,}|_{3,})\s*$/.test(lines[i]) &&
                       !/^>\s?/.test(lines[i]) &&
                       !isListLine(lines[i]) &&
                       !(lines[i].indexOf('|') !== -1 && i + 1 < n && isTableSeparator(lines[i + 1]))) {
                    paraLines.push(lines[i]);
                    i++;
                }
                if (paraLines.length) {
                    html += '<p>' + paraLines.map(inlineFormat).join('<br>') + '</p>';
                }
            }
            return html;
        }

        // Entry point: render markdown string to HTML (with HTML-escaping first).
        function renderMarkdown(md) {
            if (!md) return '';
            md = md.replace(/\r\n?/g, '\n');
            md = escapeHtml(md); // XSS-safe first
            return parseBlocks(md.split('\n'));
        }

        // === 文件加载工具函数 ===
        // 优先 fetch；file:// 协议下回退 XMLHttpRequest（部分浏览器允许）
        function loadFileText(url) {
            // HTTP(S) 协议直接用 fetch
            if (location.protocol.startsWith('http')) {
                return fetch(url).then(r => {
                    if (!r.ok) throw new Error('HTTP ' + r.status);
                    return r.text();
                });
            }
            // file:// 协议：先试 fetch，失败后回退 XHR
            return fetch(url)
                .then(r => r.text())
                .catch(function() {
                    return new Promise(function(resolve, reject) {
                        var xhr = new XMLHttpRequest();
                        xhr.open('GET', url, true);
                        xhr.overrideMimeType('text/plain; charset=utf-8');
                        xhr.onload = function() {
                            if (xhr.status === 200 || xhr.status === 0) {
                                resolve(xhr.responseText);
                            } else {
                                reject(new Error('HTTP ' + xhr.status));
                            }
                        };
                        xhr.onerror = function() {
                            reject(new Error('Failed to fetch (file:// protocol may block local file access)'));
                        };
                        xhr.send();
                    });
                });
        }

        // === State ===
        let currentPath = [];   // array of folder names
        let selectedFile = null; // file object or null
        let viewMode = 'list';  // 'grid' or 'list'
        let fileViewMode = 'preview'; // 'preview' | 'source' — 文件内容预览/源码切换，默认预览

        // === Render breadcrumb bar ===
        function renderBreadcrumb() {
            const bar = document.getElementById('breadcrumbBar');

            const root = document.createElement('span');

            if (currentPath.length === 0 && !selectedFile) root.classList.add('crumb-active');
            root.onclick = function(e) {
                e.stopPropagation();
                currentPath = [];
                selectedFile = null;
                renderAll();
            };
            bar.appendChild(root);

            // Path segments
            for (let i = 0; i < currentPath.length; i++) {
                const sep = document.createElement('span');
                sep.className = 'crumb-sep';
                sep.textContent = '/';
                bar.appendChild(sep);

                const crumb = document.createElement('span');
                crumb.className = 'crumb';
                if (i === currentPath.length - 1 && !selectedFile) crumb.classList.add('crumb-active');
                crumb.innerHTML = escapeHtml(currentPath[i]) + '<span class="crumb-arrow">\u25BE</span>';
                crumb.onclick = function(e) {
                    e.stopPropagation();
                    showDropdown(i, this);
                };
                bar.appendChild(crumb);
            }

            // Selected file crumb
            if (selectedFile) {
                const sep = document.createElement('span');
                sep.className = 'crumb-sep';
                sep.textContent = '/';
                bar.appendChild(sep);

                const crumb = document.createElement('span');
                crumb.className = 'crumb crumb-active';
                crumb.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="#38a169" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> ' + escapeHtml(selectedFile.name) + '<span class="crumb-arrow">\u25BE</span>';
                crumb.onclick = function(e) {
                    e.stopPropagation();
                    showFileDropdown(this);
                };
                bar.appendChild(crumb);
            }

            // "Select" trigger at the end (for current level)
            const sep = document.createElement('span');
            sep.className = 'crumb-sep';
            sep.textContent = '/';
            bar.appendChild(sep);

            const trigger = document.createElement('span');
            trigger.className = 'crumb';
            trigger.style.border = '2px dashed #cbd5e0';
            trigger.style.color = '#64748b';
            trigger.innerHTML = (selectedFile ? '\u21C5 \u5207\u6362\u6587\u4EF6' : '<svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> \u9009\u62E9') + '<span class="crumb-arrow">\u25BE</span>';
            trigger.onclick = function(e) {
                e.stopPropagation();

                    showDropdown(currentPath.length, this);
                }

        }

        // === Show dropdown at a given path depth ===
        function showDropdown(depth, anchorEl) {
            closeDropdown();
            // depth = number of path segments already selected; show children at that level
            const segs = currentPath.slice(0, depth);
            const node = getNodeAtPath(segs);
            if (!node) return;

            const dd = document.createElement('div');
            dd.className = 'path-dropdown';
            dd.id = 'pathDropdown';

            // Folders
            const folderKeys = Object.keys(node.children).sort();
            for (const key of folderKeys) {
                const child = node.children[key];
                const cnt = countFiles(child);
                const item = document.createElement('div');
                item.className = 'dd-item dd-folder';
                if (depth < currentPath.length && currentPath[depth] === key) item.classList.add('dd-item-active');
                item.innerHTML = '<span class="dd-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span><span>' + escapeHtml(key) + '</span><span class="dd-count">' + cnt + '</span>';
                item.onclick = function(e) {
                    e.stopPropagation();
                    currentPath = segs.concat([key]);
                    selectedFile = null;
                    closeDropdown();
                    renderAll();
                };
                dd.appendChild(item);
            }

            // Files
            const files = node.files.slice().sort(function(a, b) { return a.name.localeCompare(b.name); });
            for (const file of files) {
                const item = document.createElement('div');
                item.className = 'dd-item dd-file';
                if (selectedFile && selectedFile.path === file.path) item.classList.add('dd-item-active');
                const ver = file.version ? '<span class="dd-meta">' + escapeHtml(file.version) + '</span>' : '';
                item.innerHTML = '<span class="dd-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#38a169" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span>' + escapeHtml(file.name) + '</span>' + ver;
                item.onclick = function(e) {
                    e.stopPropagation();
                    currentPath = segs;
                    selectedFile = file;
                    closeDropdown();
                    renderAll();
                };
                dd.appendChild(item);
            }

            if (folderKeys.length === 0 && files.length === 0) {
                const empty = document.createElement('div');
                empty.className = 'dd-empty';
                empty.textContent = '\u6B64\u76EE\u5F55\u4E3A\u7A7A';
                dd.appendChild(empty);
            }

            positionDropdown(dd, anchorEl);
        }

        // === Show file dropdown (switch file at current folder level) ===
        function showFileDropdown(anchorEl) {
            closeDropdown();
            const node = getNodeAtPath(currentPath);
            if (!node) return;

            const dd = document.createElement('div');
            dd.className = 'path-dropdown';
            dd.id = 'pathDropdown';

            // Also show folders so user can switch to a folder
            const folderKeys = Object.keys(node.children).sort();
            for (const key of folderKeys) {
                const child = node.children[key];
                const cnt = countFiles(child);
                const item = document.createElement('div');
                item.className = 'dd-item dd-folder';
                item.innerHTML = '<span class="dd-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span><span>' + escapeHtml(key) + '</span><span class="dd-count">' + cnt + '</span>';
                item.onclick = function(e) {
                    e.stopPropagation();
                    currentPath = currentPath.concat([key]);
                    selectedFile = null;
                    closeDropdown();
                    renderAll();
                };
                dd.appendChild(item);
            }

            const files = node.files.slice().sort(function(a, b) { return a.name.localeCompare(b.name); });
            for (const file of files) {
                const item = document.createElement('div');
                item.className = 'dd-item dd-file';
                if (selectedFile && selectedFile.path === file.path) item.classList.add('dd-item-active');
                const ver = file.version ? '<span class="dd-meta">' + escapeHtml(file.version) + '</span>' : '';
                item.innerHTML = '<span class="dd-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#38a169" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span>' + escapeHtml(file.name) + '</span>' + ver;
                item.onclick = function(e) {
                    e.stopPropagation();
                    selectedFile = file;
                    closeDropdown();
                    renderAll();
                };

        function positionDropdown(dd, anchorEl) {
            document.body.appendChild(dd);
            const rect = anchorEl.getBoundingClientRect();
            let left = rect.left;
            if (left + 320 > window.innerWidth) left = window.innerWidth - 330;
            if (left < 10) left = 10;
            dd.style.left = left + 'px';
            dd.style.top = (rect.bottom + 6) + 'px';
            setTimeout(function() { document.addEventListener('click', closeDropdown); }, 0);

        function closeDropdown() {

        // === Render content area ===

                        '<button class="view-toggle-btn' + (fileViewMode === 'source' ? ' active' : '') + '" onclick="setFileViewMode(\'source\')" title="查看原始 Markdown 源码"><svg class="uicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> 源码</button>' +
                    '</div>';

                header.innerHTML =
                    '<button class="back-btn" onclick="goBack()" title="返回上一级"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>' +
                    '<div class="content-title"><svg viewBox="0 0 24 24" fill="none" stroke="#38a169" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg> ' + escapeHtml(selectedFile.title || selectedFile.name) + '</div>' +
                    '<div class="content-meta">' + verHtml + dateHtml + fileToggleHtml + '</div>';

                // 优先使用 fetch（HTTP 场景）；file:// 协议下 fetch 可能被浏览器拦截，回退到 XMLHttpRequest
                loadFileText(selectedFile.path)
                    .then(text => {
                        let innerHtml;
                        if (fileViewMode === 'source') {
                            // 源码模式：保留原始 Markdown 文本
                            innerHtml = '<pre>' + escapeHtml(text) + '</pre>';
                        } else {
                            // 预览模式：渲染为排版后的网页

                        }
                        const html = '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><style>' + MD_CSS + '</style></head><body>' + innerHtml + '</body></html>';
                        const blob = new Blob([html], { type: 'text/html; charset=utf-8' });
                        iframe.src = URL.createObjectURL(blob);
                    })
                    .catch(err => {
                        var hint = location.protocol === 'file:'
                            ? '<br><br>提示：直接打开 HTML 文件时浏览器可能限制本地文件访问。请使用开发服务器：<code>python3 server.py</code>'
                            : '';
                        iframe.srcdoc = '<!DOCTYPE html><html><body style="padding:20px;color:#e53e3e">无法加载文档：' + escapeHtml(err.message) + hint + '</body></html>';

            } else {
                // Show folder contents
                const node = getNodeAtPath(currentPath);
                if (!node) {
                    body.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div><div class="empty-state-text">\u672A\u627E\u5230\u76EE\u5F55</div></div>';
                    return;
                }

                body.innerHTML = '';

                const header = document.createElement('div');
                header.className = 'content-header';
                const folderName = currentPath.length === 0 ? 'Wiki \u6839\u76EE\u5F55' : currentPath[currentPath.length - 1];
                const totalFolders = Object.keys(node.children).length;
                const totalFiles = node.files.length;

                // View toggle
                const toggleHtml =
                    '<div class="view-toggle">' +
                        '<button class="view-toggle-btn' + (viewMode === 'grid' ? ' active' : '') + '" onclick="setViewMode(\'grid\')"><svg class="uicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> \u5361\u7247</button>' +
                        '<button class="view-toggle-btn' + (viewMode === 'list' ? ' active' : '') + '" onclick="setViewMode(\'list\')"><svg class="uicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg> \u5217\u8868</button>' +
                    '</div>';

                var backBtnHtml = (currentPath.length > 0)
                    ? '<button class="back-btn" onclick="goBack()" title="返回上一级"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>'
                    : '';

                header.innerHTML =
                    backBtnHtml +
                    '<div class="content-title"><svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg> ' + escapeHtml(folderName) + '</div>' +
                    '<div class="content-meta">' +
                        '<span class="badge-count">' + totalFolders + ' \u4E2A\u5B50\u76EE\u5F55</span>' +
                        '<span class="badge-count">' + totalFiles + ' \u4E2A\u6587\u4EF6</span>' +
                        toggleHtml +
                    '</div>';
                body.appendChild(header);

                const container = document.createElement('div');
                container.className = viewMode === 'grid' ? 'folder-grid' : 'folder-list';

                // Sub-folders
                const folderKeys = Object.keys(node.children).sort();
                for (const key of folderKeys) {
                    const child = node.children[key];
                    const cnt = countFiles(child);

                    let folderDesc = '';
                    const readme = child.files.find(function(f) { return f.name === 'README.md'; });
                    if (readme) folderDesc = readme.desc || '';
                    if (!folderDesc && child.files.length > 0) folderDesc = child.files[0].desc || '';

                    if (viewMode === 'grid') {
                        const card = document.createElement('div');
                        card.className = 'grid-card grid-card-folder';
                        card.onclick = function() {
                            currentPath = currentPath.concat([key]);
                            selectedFile = null;
                            renderAll();
                        };
                        card.innerHTML =
                            '<span class="grid-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>' +
                            '<div class="grid-card-body">' +
                                '<div class="grid-card-name">' + escapeHtml(key) + '</div>' +
                                (folderDesc ? '<div class="grid-card-desc">' + escapeHtml(folderDesc) + '</div>' : '') +
                                '<div class="grid-card-meta"><span class="badge-count">' + cnt + ' \u4E2A\u6587\u4EF6</span></div>' +
                            '</div>';
                        container.appendChild(card);
                    } else {
                        const item = document.createElement('div');
                        item.className = 'list-item';
                        item.onclick = function() {
                            currentPath = currentPath.concat([key]);
                            selectedFile = null;
                            renderAll();
                        };
                        item.innerHTML =
                            '<span class="list-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>' +
                            '<div class="list-item-body">' +
                                '<div class="list-item-name">' + escapeHtml(key) + '</div>' +
                                (folderDesc ? '<div class="list-item-desc">' + escapeHtml(folderDesc) + '</div>' : '<div class="list-item-desc">\u00A0</div>') +
                            '</div>' +
                            '<div class="list-item-meta"><span class="badge-count">' + cnt + ' \u4E2A\u6587\u4EF6</span></div>';
                        container.appendChild(item);
                    }
                }

                // Files
                const files = node.files.slice().sort(function(a, b) { return a.name.localeCompare(b.name); });
                for (const file of files) {
                    const verHtml = file.version ? '<span class="badge-version">' + escapeHtml(file.version) + '</span>' : '';
                    const dateHtml = file.date ? '<span class="badge-date">' + escapeHtml(file.date) + '</span>' : '';

                    if (viewMode === 'grid') {
                        const card = document.createElement('div');
                        card.className = 'grid-card grid-card-file';
                        card.onclick = function() {
                            selectedFile = file;
                            renderAll();
                        };
                        card.innerHTML =
                            '<span class="grid-card-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#38a169" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>' +
                            '<div class="grid-card-body">' +
                                '<div class="grid-card-name">' + escapeHtml(file.title || file.name) + '</div>' +
                                (file.desc ? '<div class="grid-card-desc">' + escapeHtml(file.desc) + '</div>' : '') +
                                '<div class="grid-card-meta">' + verHtml + dateHtml + '</div>' +
                            '</div>';
                        container.appendChild(card);
                    } else {
                        const item = document.createElement('div');
                        item.className = 'list-item';
                        item.onclick = function() {
                            selectedFile = file;
                            renderAll();
                        };
                        item.innerHTML =
                            '<span class="list-item-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#38a169" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span>' +
                            '<div class="list-item-body">' +
                                '<div class="list-item-name">' + escapeHtml(file.title || file.name) + '</div>' +
                                (file.desc ? '<div class="list-item-desc">' + escapeHtml(file.desc) + '</div>' : '<div class="list-item-desc">\u00A0</div>') +
                            '</div>' +
                            '<div class="list-item-meta">' + verHtml + dateHtml + '</div>';
                        container.appendChild(item);
                    }
                }

                if (folderKeys.length === 0 && files.length === 0) {
                    body.innerHTML = '<div class="empty-state"><div class="empty-state-icon"><svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div><div class="empty-state-text">\u6B64\u76EE\u5F55\u4E3A\u7A7A</div></div>';
                    return;
                }

                body.appendChild(container);
            }
        }

        function goBack() {
            if (selectedFile) {
                selectedFile = null;
                renderAll();
            } else if (currentPath.length > 0) {
                currentPath = currentPath.slice(0, -1);
                renderAll();
            }
        }

        function setViewMode(mode) {
            viewMode = mode;
            renderContent();
        }

        function setFileViewMode(mode) {
            if (mode !== 'preview' && mode !== 'source') return;
            fileViewMode = mode;
            if (selectedFile) {
                // 仅重新渲染内容区域，无需重渲染面包屑
                renderContent();
            }
        }

        function renderAll() {
            renderBreadcrumb();
            renderContent();
            // Scroll content into view
            document.querySelector('.content-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // === Deep link via query param ===
        (function handleDeepLink() {
            const params = new URLSearchParams(location.search);

            // Task B: 跳转到某个目录（文件夹列表视图）
            const dirParam = params.get('dir');
            if (dirParam) {
                // path 形如 ../00-项目总览；去掉开头的 '..' 段后解析目录树
                const segs = dirParam.split('/').slice(1);
                if (getNodeAtPath(segs)) {
                    currentPath = segs;
                    selectedFile = null;
                }
                // 目录不存在（含非法 path）时回退到根目录树，不崩溃
                return;
            }

            // Task A: 打开具体文件
            const openPath = params.get('open');
            if (!openPath) return;
            const file = wikiData.find(f => f.path === openPath);
            if (file) {
                selectedFile = file;
                // 去掉开头的 '..' 段，并去掉文件名，得到真实目录路径
                currentPath = file.path.split('/').slice(1, -1);
            } else {
                const suffix = openPath.replace(/^\.\.\//, '');
                const found = wikiData.find(f => f.path.endsWith(suffix));
                if (found) {
                    selectedFile = found;
                    currentPath = found.path.split('/').slice(1, -1);
                }
            }
        })();

        // === Init ===
        renderAll();

    </script>
</body>
</html>
