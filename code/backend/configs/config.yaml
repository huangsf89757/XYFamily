server:
  port: 8080
  mode: debug

database:
  host: localhost
  port: 5432
  user: xyfamily
  password: ""
  database: xyfamily
  sslmode: disable
  max_conns: 100
  min_conns: 10

redis:
  host: localhost
  port: 6379
  password: ""
  db: 0

jwt:
  secret: ""   # 禁止留空上线：生产必须通过环境变量 XYFAMILY_JWT_SECRET 注入
  access_ttl: 1800
  refresh_ttl: 604800
  issuer: xyfamily

security:
  bcrypt_cost: 12
  verification_code_ttl: 300
  verification_code_length: 6
  rate_limit_threshold: 5
  rate_limit_window: 300
  rate_limit_lock: 900
  reset_rate_limit: 3
  deactivate_grace_days: 30

pii:
  encryption_key: ""
  index_key: ""

cors:
  # 生产请用环境变量 XYFAMILY_CORS_ORIGINS（逗号分隔）覆盖；禁止使用 "*" 与凭证同时开启
  origins:
    - "http://localhost:3000"
    - "http://localhost:5173"
    - "http://127.0.0.1:3000"

log:
  level: info
  format: json
